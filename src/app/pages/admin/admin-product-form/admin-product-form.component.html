<section>
    <div class="container h-100">
        <div class="row d-flex justify-content-center align-items-center h-100">
            <form class="text-center p-5" [formGroup]="productForm" (ngSubmit)="onSubmit()">

                <h1>Add Product</h1>

                <div class="form-group mb-4">
                    <input type="text" class="form-control" formControlName="name" placeholder="Name">
                    <small class="text-danger" *ngIf="productForm.get('name')?.touched && productForm.get('name')?.invalid">
                        Enter name.
                    </small>
                </div>

                <div class="form-group mb-4">
                    <textarea class="form-control" formControlName="description" placeholder="Description"></textarea>
                </div>

                <div class="form-group mb-4">
                    <input type="number" class="form-control" formControlName="price" placeholder="Price">
                    <small class="text-danger" *ngIf="productForm.get('price')?.touched && productForm.get('price')?.invalid">
                        Enter a valid price.
                    </small>
                </div>

                <div class="form-group mb-4 text-start">
                    <select class="form-control" formControlName="gender">
                        <option value="">Select Gender</option>
                        <option value="men">Men</option>
                        <option value="women">Women</option>
                    </select>
                    <small class="text-danger" *ngIf="productForm.get('gender')?.touched && productForm.get('gender')?.invalid">
                        Enter gender.
                    </small>
                </div>

                <div class="form-group mb-4">
                    <input type="text" class="form-control" formControlName="productImage" placeholder="Product Image">
                </div>

                <button type="submit" class="btn btn-primary w-100" [disabled]="loading">
                    {{loading ? 'Submitting...' : 'Submit' }}
                </button>

            </form>

        </div>

    </div>
</section>
